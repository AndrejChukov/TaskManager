spring:
  application:
    name: TaskManager
  datasource:
    generate-unique-name: false
    url: jdbc:h2:mem:taskdb
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
  sql:
    init:
      mode: always
  jpa:
    hibernate:
      ddl-auto: none
  data:
    web:
      pageable:
        serialization-mode: via-dto
  security:
    jwt:
      secret-key: a-very-long-and-secure-random-secret-key-that-is-at-least-32-chars-long
      expiration-time: 15
      algorithm: HS256