spring:
  datasource:
    url: jdbc:postgresql://db:5432/taskmanager
    username: myuser
    password: mypassword
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
  security:
    jwt:
      secret-key: a-very-long-and-secure-random-secret-key-that-is-at-least-32-chars-long
      expiration-time: 15
      algorithm: HS256